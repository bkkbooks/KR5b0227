front:
  text: 洞玄靈寶齊說光燭戒罰燈祝願儀化六
  hash: sha256:95a7e87246e656249245b86b31fe2ad00d72ba2015cbe3da99a93132bcc7bfd5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0227_HFL_000-001a, image: hfl/0293/0293-158.png}
body:
  text: 爝光齊外說陸修靜撰齊集先於私房燒香束帶說之爝光者猶莊子所謂爝火也為光之微者原夫齊法至精而行者常粗實五濁垢障深蒙難啓如處曲穴非太陽所照延引幽暗者宜以燈燭之明今以爝光斯之謂也皆標齊經大㫖舉法體近要意以約束粗猥示導玄徹又若匠之選木斜曲甚者未近繩墨要先裁其外然後加以成規愧乎余之鄙拙乃至此之繁蕪或由木理又㧝難為師工邪此法造齊醮先於私房說之束帶香火如法夫齊當拱默幽室制伏性情閉固神關使外纍不入守持十戒令俗想不起建勇猛心修十道行堅植志意不可移拔注玄味真念念皆淨如此可謂之齊一香湯沐浴以精神氣使五體清潔九孔鮮明衣服悉淨內外芳馨延降髙真視接虛靈故也二廢棄世務斷俗因緣屏隔內外簫然無為形心間靜注念專精三中食絶味挫割嗜欲使盈虛得節臟腑調和神氣清夷含養元泉四謹身正服齊整嚴肅捨離驕慢無有怠替禮拜叩摶每事盡節五閉口息語不得妄言調聲正氣誦詠經文開悟人鬼㑹感仙聖六滌除心意不得邪想調伏六根蕩滅三毒存神思真通洞幽微七燒香奏煙鳴鼓召神上聞三清普宣十方八懴謝罪咎請乞求願心丹至誠謙苦懇惻九發大慈悲愍念一切災厄惱難咸願度脫生死休泰無復憂苦十進止俯仰每盡閉雅更相開導言止於道不得離法覺有跌誤便即踰失稽顙懴悔所謂靈寶自然無上齊者靈者神也微妙之功出於思議之表變化無窮故謂之靈也寶者一也是三才所得而清寧貞也既不可失故謂之寶若抱之不離則萬福自臻違之俄頃則災禍亂集吉凶利害得失所由無有能使之然亦無能使之不然是以謂之自然周濟五道度脫一切絶滅生死超逸三界故謂之無上夫人體非聖真而處身五濁三尸強盛內生攻賊九竅四關各有所趣施為之向動入死地致傷天年命不終天壽犯惡為非結罪幽司故居世轗軻人道不休飢寒窮賤疾病刑罰災害所纒凶禍所集命過之後方履苦難是故太上天尊開玄都上宮紫微玉笈出靈寶妙齊以人三關躁擾不能間停身為殺盜淫動故役之以禮拜口有惡言綺妄兩舌故課之以誦經心有貪欲嗔恚之念故使之以思神用此三法洗心淨行心行精至齊之義也廣願善念以弘福業持戒之心當如墜井把綆不可乍失務法之意如壅崩堤不可間惰習念之情如種良田無有厭足一日一夜奉戒尊法孜孜不倦則感通太玄真靈降集三尸竄滅衆魔摧伏如此之願願無不獲志無不剋也夫聖世難遭經法難聞良時難值明師難遇諸賢前生並有大福致慶㑹今身得值三寶聞見法音好尚清虛餐納靈味皆巳玄名帝圖金書玉籙為天堂之福賔太上之仙客今又擢身法座服膺法軌巳有善始何不克終當共堅持心志與懈怠競禀承法訓念為妙行努力勵誠勿計疲勞一日精進歷世受福人命危險四大難保百年倐忽何足為多如使衰老奄至眼暗耳聾加以衆疾痛惱相纒眠坐呼吸舉動須人氣力如是當復能道業精進預此法座以不一失善緣後㑹何期沉溺窮道悔恨何益想思此言各為身計相與勉勵共濟厄難夫人先身有重罪惡對則為廕蓋所褁六蔽不開心意曲狹氣性逆戾迷著五欲莫窺其外甘肥聲色取快目前憎善嫉賢甚若怨讎如此之人在所墮向與惡為緣終不與經教相遇遇亦不信見人敬順道法乃謂妖妄咸共誹笑夫聾者不聞韶武瞽者不覩白黑豈言巳病哉縱有善識强相牽挽既非本性回生悔心背真向僞追逐精邪夫歡樂暫過憂苦延長斯輩皆以三塗為歸道地獄為居家永淪幽夜不覩三光抱銅柱履刀山循劔樹入鑊湯吞火食炭終劫無脫縱更受生墮六畜形身被屠割之酷魂因三惡之中往反流曵可不哀哉法燭敘陸修靜撰建齊暮始就燒香宿啓未思神前東向說之法燭法者規矩之謂總稱曰法規圓矩方萬物從之得正者也燭者有光之物佐月輔日開昏朗暗用其明得有所見也邪曲無法則無以自正用法無明則莫見得失欲正不可無法用法不可無明自定不可不齊齊不可無此書此書為之法燭乘之以游道藏故剋獲於真寶也夫萬物以人為貴人以生為寶生之所賴唯神與氣神氣之在人身為四體之命人不可須㬰無氣不可俯仰失神失神則五臟潰壤失氣則顚蹶而亡氣之與神常相隨而行神之與氣常相宗為强神去則氣亡氣絶則身喪一切皆知畏死而樂生不知生活之功在於神氣而數凶其心而犯其氣屢淫其神而凋其命不愛其靜存守其真故致於枉殘也人何可不惜精守氣以要久延之視和愛育物為枝葉之福聖人以百姓奔競五欲不能自定故立齊法因事息事禁戒以間內冦威儀以防外賊禮誦役身口乘動以反靜也思神役心念御有以歸虛也能靜能虛則與道合譬回逸驥之足以整歸真之駕嚴遵云虛心以原道德靜氣以期神靈此之謂也而末世學者貴華賤實福在於靜而動以求之命在於我而捨己就物若斯之徒雖欣修齊不解齊法或解齊法不識齊體或識齊體不達齊義或達齊義不得齊意紛紜錯亂靡所不為流宕失宗永不自覺譬背驚風而順迅流不知泝洄反源遂長淪於苦海可不悲哉余謹博採衆經集為十章以施齊時名曰法燭宿啓說一章六時行道說六章三時思神說三章若法師必炳之以行齊法衆官主人皆能虛心奉受者則視聽明朗庶覩大道之門也夫道者至理之目德者順理而行經者由通之徑也道猶道路也德謂善德也經猶徑度也行猶行步也法猶法式也夫人學道要當依法尋經行善成德以至於道若不作功德但守一不移終不成道譬如人坐於家中而不行步豈得見道里邪夫道三合成德自不滿三諸事不成三者謂道德仁也仁一也行功德二也德足成道三也三事合乃得道也若人但作功德而不曉道亦不得道若但曉道而無功德亦不得道若但有道德而無仁則至理翳沒歸於無有譬如種穀投種土中而無水潤何能生乎有君有臣而無民何宰牧乎有天有地而無人物何成養乎故五千文曰三生萬物授上品十戒選署禁罰悉准按採用陸法師所撰立文先宿啓畢次授上品十戒一時東向平立誦智慧頌曰智慧起本無玄玄超十方結空峙玄霄諸天挹流芳其妙難思議靈感真實通有有竟不有無無無不容智慧恆觀身學道之所先眇眇入玄思自終録我神天尊常擁護魔王為保言晃晃金剛軀迢迢太上前智慧生戒根真道戒為主三寶由是興髙聖所崇受泛此不死舟倐歘濟大有當此說戒時諸天來稽首次誦畢一時北向首體投地回心禮十方還向東而伏法師還東靣向西說戒威儀天尊告太上道君曰今當普宣法音開悟羣生為諸男女解災却患請福度命拔諸苦根使生者見道身脫八難死者歡樂飲食天堂早生人中轉輪聖王修齊求道皆當一心請奉十戒諦受勿忘專情默念洞思自然勿得雜想撓亂形神能如是者便當靜聽第一戒者心不惡妬無生隂賊檢口愼過想念在法第二戒者守仁不殺愍濟羣生慈愛廣救潤及一切第三戒者守貞讓義不淫不盜常行善念損己濟物第四戒者不色不欲心無放蕩貞潔守愼行無㸃汚第五戒者口無惡言言不華綺內外中直不犯口過第六戒者斷酒節行調和氣性神不損傷不犯衆惡第七戒者不嫉人勝口爭竸功名每事遜讓退身度人第八戒者不得評論經教訾毀聖文躬心承法恆如對神第九戒者不得鬪亂口舌評詳四輩天人咎恨傷損神氣第十戒者舉動施為平等一心人和神穆行常使然天尊言修奉清戒每合天心常行大慈願為一切普度厄世謙謙尊教不得中怠寧守善而死不為惡而生於是不退可得拔度五道不履三惡諸天所護萬神所敬長齊奉戒自得度世天尊言道尊法妙人身亦貴故道開法遺戒經文以度人身人身既度上與道同宜為行持齊奉戒夷心靜默志念分明一意歸向專想不二滌蕩六腑過中不味內外清虛每合自然是其齊日捻香啓願應心上徹四天司邏十部威神即下履行觀聽法音監映爾心如戒行道皆列功諸天禍福立彰道不負人勤行諦受勿使魔言天尊言建齊行道四天帝王皆駕飛雲緑軿八景玉輿從真人玉女手把花幡前導鳯歌後從天鈞白鶴獅子嘯歌雍雍燒香散花浮空而來瞻履行道視聽法音天王下降萬靈朝焉是豈可不盡其法耶當先授十戒然後行道庠序雅步靜心間意坐起卧息不離儀格天王歡恱列名上清可謂得道方寸之間經言夫感天地致羣神通仙道洞至真解積世罪滅凶咎却怨家修盛德治疾病濟一切莫過乎齊轉經者也夫齊直是求道之本莫不由斯成矣此功德巍巍無能比者上可升仙得道中可安國寧家延年益壽保於福祿得無為之道下除宿愆赦見世過救厄拔難消滅災病解脫死人憂苦度一切物莫有不宜矣經言夫齊法之大者莫先太上靈寶齊靈寶之文是天地之元根神明之戶牖衆經之祖宗無量大法橋也若誦經一句則響徹九霄諸天設禮鬼神振肅也幽深逺妙難以宣言夫非天下之至善莫能致焉非天下之至信莫能請焉非天下之至精莫能奉焉非天下之至才莫能行焉太上所重衆真所尊皆鑄金為字刻書玉篇封之於無上大羅天玄都玉京山紫微上宫七寶玄臺此臺則是太上所治也五老侍衛萬帝朝真玉女執巾金童揚煙焚百和合香流熏紫庭吐日精以却穢散月華以拂塵神燈朝照炳燭合明金風八散慶雲四陳飛龍毒獸備衛玉闕十方至真三千大千巳得道大聖衆及自然妙行真人皆一日三時旋繞上宫稽首行禮飛虛浮空散花燒香手把十絶嘯詠洞章讃九天之靈奧尊玄文之妙重也今道士齊時所以巡繞髙座吟詠步虛者正是上法玄根衆聖真人朝宴玉京時也行道禮拜皆當安徐雅步審整庠序俯仰齊同不得參差巡行步虛皆執板當心冬月不得拱心夏月不得把扇唯正身前向臨目內視存見太上在髙座上注念玄真使心形同丹合於天典則為飛仙之所嗟歎三界之所軌範鬼神之所具瞻也不得左顧右盻更相前却及言語笑謔有所呵喚則觸忤威靈四司紏過五帝結刑則科所禁可不愼哉經言齊時日夕各三時燒香悔過唯一心聽受經法妙頤之義故轉經說法像古真人教化時也聖人傳授經教教於世人使未聞者聞未知者知欲以此法橋普度一切人也行道之時故不可得亂語論及世務唯當請問法師經義禁戒法師當為解說真要能使內外夷然敬受經一句則司命延加十算後皆聰明智慧若內外躁競毀忤經文一句則司命奪十算後墮癡愚盲道故真人不言言必有中言皆合於法言人能弘道非道弘人此之謂也說戒畢法師依舊選署衆官衆官長跪受簡札明日行道各典所署法師經云當舉髙德玄解經義斯人也道德內充威儀外備俯仰動止莫非法式三界所範鬼神所瞻關啓祝願通真召靈釋疑解滯導達羣賢都講經云才智精明間鍊法度其任也行道時節上下食息先自法師次引衆官禮拜揖讓皆當讃唱監齊其職也司察衆過彈紏愆失秉執科憲隨事舉白必使允當不得隱濫侍經其職也營侍尊經整理巾藴髙座几案四座席地拂拭齊整不得怠懈侍香其職也當料理爐器恆令火然灰淨六時行道三時講誦皆預備辦不得臨時有闕侍燈其職也景臨西方備辦燈具依法安置光焰火然恆使明朗若過風兩火勢不立咨白法師宜停乃停不得怠替輒令闕廢選署畢左回上香東向祝復香衆官引行出治按次列坐勿解帶法師更為宣科說禁告示威儀衆官靜聽道士登齊皆當各齎巾褐手板履具不得臨時交換彼我於事有闕勿得牽引非巳之服齊日燒香上講都講當率衆官先下牀西向倚法師然後下座引行尊卑以次安行雅步到於道戶不得更相越錯遲疾不均皆依事紏罰燒香竟及下講率衆官先出治戶還悉西向倚法師後至上牀衆官一時禮一拜然後就坐道士登齊起居皆當關白監齊禮法師一拜次禮香三拜而去還亦如之有違罰如後條到齊堂屐履不整罰油二升坐起不庠序罰硃半兩不正坐罰香二斤翻覆香火罰香半斤臨行事與外人言罰香一斤侍經不整飾髙座觸物罰香半斤語及世務罰油二升語言戲笑罰硃一兩倚語低睡罰硃半兩翻覆燈油罰油五升巾褐不整罰香半斤內外不豫相檢飭音聲髙厲罰油五升聽經倚據不執簡罰油一升不注念清虛心想意倦為衆所覺罰油二升起出齊堂不相關白罰油二升垂髮馳步罰香一斤讀經忽亂請問敗句罰油五升唱聲不齊罰油二升行香不洗手漱口罰油二升坐起揖讓失儀罰香半斤巡行不依次第罰香半斤侍香香煙中絶罰油四升都講不謹唱讃罰香一斤起行來及還坐不禮經三拜徑去罰香一斤侍燈燈火中滅罰香一斤臨燒香突行罰油一升齊主供具不辦觸物有闕罰香一斤執紏見過不彈私隱罰油六升受關不啓上罰油三升齊次而因起居逃遁不返為衆所紏罰油一斗香一斤妄言綺語論及私鄙罰香一斤油五升硃三兩金籙曰登齊下座於法事有虧從一至三監齊依事彈罰從三以上當斷功削除宣示同學不得容在法座監齊容縱不紏亦同生者之罰又止座法師於事有虧當録愆失送簡監齊從一至三斷功三百日不得更在法座威儀曰罰物送齊主宣示百姓然後供公家用凡此禁制並出玄都上宫明科舊典戒於惰慢檢肅愆違天尊慈仁曲愍行尸齊而獲罪故開黜罰之科聽以香油輸贖可得災蒙釋散不欲令結罪冥中兼使犯憲之子知懷愧惻之心攺塗革弊自新有階又香油乃不為多然卒難交辦且道士一日齊㑹多非舊衆法座既畢各各離散不得輸送更違經㫖增其咎考夫逆惡之身犯莫大之罪猶使齊戒請贖消散釁負且齊之所修尊乎禮拜而況戒尚之士但儀式之失若以禮拜罰之亦在可通其拜數多少當隨目輕重執事之官臨時詳判敬白齊主夫齊法至精威禁甚嚴所以爾者天真大神十方衆聖及三界羣靈皆親降齊所觀聽行道魔王又手作禮所在神祇皆來侍衛門戶齊主當灑掃宅舍必今淨潔丁勑大小使內外靜寂標門斷客不得使異人常俗之徒往來干冒若善男善女信樂道法束帶清靜聽來觀化然當别席坐起不得參雜齊主大小皆束帶躡履不得散誕踉履若宜處分每和聲下氣不得更相呼喚音聲高厲則觸忤天真犯千靈禁客及齊主若有哀慘雖未相見皆當夷常不得慰弔哀聲相對若賔賤主貴有瓦玉之殊世情拘繫多未通逹雖復憑向道法不能恭敬道士夫道尊德貴天下莫二雖道士卑微其標心髙大齊主既希懷幽微期誠恩祐法應遜意屈節捐情虛巳則善德歸流福喜交集不得凝抗倨傲輕忽道士則幽津挹絶玄澤不至夫上天降雨而均注無偏川流常盈而峯嶺無潤為其形髙嶮峭無有容納之處東海所以獨為百川王者非能恃威任勢强制苟抑但由其體夫極曠而處卑居下舍垢莫逆致為衆流所湊若有小兒未堪執齊不得令觸近治堂干預齊次夫齊者正以清虛為體恬靜為業謙卑為本恭敬為事戰戰兢兢如履冰谷肅肅栗栗如對嚴君至經句輒起禮拜當一心稱喜隨意願念唯令丹苦必有感應太上道眼恆洞觀諸天下之喜惡無有毫遺也洞玄靈寶齊說光燭戒罰燈祝願儀
